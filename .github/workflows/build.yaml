name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Обновлено до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Обновлено до v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "SuperRenamer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # Обновлено до v4
        with:
          name: Windows-Executable
          path: dist/SuperRenamer.exe
